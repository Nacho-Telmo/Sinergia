name: CI/CD Packaging

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: sudo apt-get update && sudo apt-get install -y rpm dpkg

      - name: Construir paquetes
        run: |
          # --- Construcción DEB ---
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/sinergia-dd-burner
          cp app.py package/usr/share/sinergia-dd-burner/
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          echo -e "Package: sinergia-dd-burner\nVersion: 1.0.2\nArchitecture: all\nDepends: python3\nMaintainer: Nacho\nDescription: Sinergia DD Burner" > package/DEBIAN/control
          dpkg-deb --build package sinergia-dd-burner_1.0.2.deb

          # --- Construcción RPM ---
          # Usamos GITHUB_WORKSPACE para asegurar acceso y visibilidad
          RPM_ROOT=$GITHUB_WORKSPACE/rpmbuild
          mkdir -p $RPM_ROOT/{SOURCES,SPECS,RPMS,BUILD,BUILDROOT}
          mkdir -p $RPM_ROOT/BUILD/tmp_src
          cp app.py $RPM_ROOT/BUILD/tmp_src/
          
          # Configurar rpmbuild para usar nuestra carpeta local
          echo "%_topdir $RPM_ROOT" > ~/.rpmmacros
          
          echo -e 'Name: sinergia-dd-burner\nVersion: 1.0.2\nRelease: 1\nSummary: Sinergia DD Burner\nBuildArch: noarch\nLicense: GPL\n\n%description\nSinergia DD Burner\n\n%prep\n\n%install\ninstall -d %{buildroot}/usr/bin\ninstall -d %{buildroot}/usr/share/sinergia-dd-burner\ncp '$RPM_ROOT'/BUILD/tmp_src/app.py %{buildroot}/usr/share/sinergia-dd-burner/\necho -e "#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py \"\$@\"" > %{buildroot}/usr/bin/sinergia-dd-burner\nchmod 755 %{buildroot}/usr/bin/sinergia-dd-burner\n\n%files\n/usr/bin/sinergia-dd-burner\n/usr/share/sinergia-dd-burner/app.py' > $RPM_ROOT/SPECS/sinergia.spec
          
          rpmbuild -v -ba $RPM_ROOT/SPECS/sinergia.spec
          
          echo "Verificando existencia del archivo RPM:"
          find . -name "*.rpm"

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: paquetes-finales
          path: |
            *.deb
            **/*.rpm
