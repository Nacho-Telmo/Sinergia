name: CI/CD Packaging

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir DEB
        run: |
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/sinergia-dd-burner
          cp app.py package/usr/share/sinergia-dd-burner/
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          echo -e "Package: sinergia-dd-burner\nVersion: 1.0.2\nArchitecture: all\nDepends: python3\nMaintainer: Nacho\nDescription: Sinergia DD Burner" > package/DEBIAN/control
          dpkg-deb --build package sinergia-dd-burner_1.0.2.deb

      - name: Construir RPM con Docker
        run: |
          # 1. Construimos la imagen de Fedora
          docker build -t builder .
          
          # 2. Corremos el contenedor asignándole un nombre fijo ('mi-constructor')
          docker run --name mi-constructor builder
          
          # 3. EXTRAER A LA FUERZA: Le robamos los archivos generados directamente de sus rutas internas
          docker cp mi-constructor:/root/rpmbuild/RPMS/noarch/sinergia-dd-burner-1.0.2-1.noarch.rpm . || echo "No se encontró el RPM binario"
          docker cp mi-constructor:/root/rpmbuild/SRPMS/sinergia-dd-burner-1.0.2-1.src.rpm . || echo "No se encontró el SRPM fuente"
          
          # 4. Limpieza del contenedor
          docker rm mi-constructor

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: paquetes-finales
          path: |
            *.deb
            *.rpm
