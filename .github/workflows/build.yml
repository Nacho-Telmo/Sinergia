name: CI/CD Packaging

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir DEB
        run: |
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/sinergia-dd-burner
          cp app.py package/usr/share/sinergia-dd-burner/
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          echo -e "Package: sinergia-dd-burner\nVersion: 1.0.2\nArchitecture: all\nDepends: python3\nMaintainer: Nacho\nDescription: Sinergia DD Burner" > package/DEBIAN/control
          dpkg-deb --build package sinergia-dd-burner_1.0.2.deb

      - name: Construir RPM con Docker
        run: |
          # 1. Construir la imagen de Fedora
          docker build -t builder .
          
          # 2. Crear carpeta temporal para extraer archivos
          mkdir -p output
          
          # 3. INSPECCIÓN: Ver qué se creó realmente dentro de /root
          echo "========================================================"
          echo "=== Contenido detectado en /root/ dentro de la imagen ==="
          echo "========================================================"
          docker run --rm builder find /root -maxdepth 4 || echo "No se pudo escanear /root"
          echo "========================================================"
          
          # 4. Intentar buscar cualquier .rpm en TODO el contenedor y volcarlo afuera
          docker run --rm -v ${{ github.workspace }}/output:/mnt/output builder /bin/bash -c "find / -name '*.rpm' -exec cp {} /mnt/output/ \;"
          
          # 5. Mover el paquete a la raíz si es que existe
          mv output/*.rpm . || echo "¡ALERTA! El archivo RPM sigue sin existir dentro de la imagen"

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: paquetes-finales
          path: |
            *.deb
            *.rpm
