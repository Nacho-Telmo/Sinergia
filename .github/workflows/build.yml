name: Build DEB

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Package
        run: |
          # 1. Crear estructura de carpetas necesaria
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/sinergia-dd-burner package/usr/share/applications

          # 2. Copiar el archivo app.py desde la ruta donde está en tu repositorio
          cp sinergia-dd-burner_1.0.0/usr/share/sinergia-dd-burner/app.py package/usr/share/sinergia-dd-burner/

          # 3. Copiar el archivo .desktop que está en la raíz
          cp sinergia-dd-burner.desktop package/usr/share/applications/

          # 4. Crear el ejecutable global en /usr/bin
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner

          # 5. Crear el archivo de control
          echo -e "Package: sinergia-dd-burner\nVersion: 1.0.2\nArchitecture: all\nDepends: python3, python3-pyqt6\nMaintainer: Nacho\nDescription: Sinergia DD Burner" > package/DEBIAN/control

          # 6. Empaquetar
          dpkg-deb --build package sinergia-dd-burner_1.0.2.deb

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: sinergia-dd-burner_1.0.2.deb
