name: CI/CD Packaging

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        # Instalamos ruby para usar fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg ruby ruby-dev rubygems build-essential
          sudo gem install fpm

      - name: Construir paquetes
        run: |
          # --- Construcción DEB ---
          mkdir -p package/usr/bin package/usr/share/sinergia-dd-burner
          cp app.py package/usr/share/sinergia-dd-burner/
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          # Usamos fpm para el DEB también, es mucho más limpio
          fpm -s dir -t deb -n sinergia-dd-burner -v 1.0.2 --prefix / -C package .

          # --- Construcción RPM ---
          # Construimos el RPM directamente desde la estructura de carpetas
          # Esto evita todo el proceso de rpmbuild y sus errores silenciosos
          fpm -s dir -t rpm -n sinergia-dd-burner -v 1.0.2 --prefix / -C package .

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: paquetes-finales
          path: |
            *.deb
            *.rpm
