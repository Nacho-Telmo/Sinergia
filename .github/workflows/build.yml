# --- Construcción RPM (Forzada) ---
          # Creamos una estructura simple y empaquetamos directamente
          mkdir -p rpm_package/usr/bin rpm_package/usr/share/sinergia-dd-burner
          cp app.py rpm_package/usr/share/sinergia-dd-burner/
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > rpm_package/usr/bin/sinergia-dd-burner
          chmod 755 rpm_package/usr/bin/sinergia-dd-burner
          chmod 755 rpm_package/usr/share/sinergia-dd-burner/app.py

          # Usamos 'fpm' si estuviera disponible, pero como no lo está, 
          # vamos a usar un truco para que rpmbuild no busque dependencias fantasma
          mkdir -p rpmbuild/{SPECS,RPMS,SOURCES,BUILD,BUILDROOT}
          
          cat << 'EOF' > rpmbuild/SPECS/sinergia.spec
          Name: sinergia-dd-burner
          Version: 1.0.2
          Release: 1
          Summary: Sinergia DD Burner
          BuildArch: noarch
          License: GPL
          
          %description
          Sinergia DD Burner
          
          %install
          cp -r $GITHUB_WORKSPACE/rpm_package/* %{buildroot}
          
          %files
          /usr/bin/sinergia-dd-burner
          /usr/share/sinergia-dd-burner/app.py
          EOF
          
          rpmbuild --define "_topdir $PWD/rpmbuild" -ba rpmbuild/SPECS/sinergia.spec
          
          # Verificación final real
          echo "Buscando archivos .rpm en todo el sistema:"
          find / -name "*.rpm" 2>/dev/null
