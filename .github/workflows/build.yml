- name: Construir RPM con Docker
        run: |
          set -x
          docker build -t builder .
          # Lanzamos el contenedor en modo detached con un proceso infinito
          docker run -d --name temp-container builder tail -f /dev/null
          
          # Ahora sí podemos ejecutar comandos dentro porque el contenedor está vivo
          docker exec temp-container find /root/rpmbuild/RPMS -maxdepth 3
          
          RPM_PATH=$(docker exec temp-container find /root/rpmbuild/RPMS -name "*.rpm" | head -n 1)
          
          if [ -z "$RPM_PATH" ]; then
            echo "¡ERROR! No se encontró el archivo .rpm"
            exit 1
          fi
          
          docker cp temp-container:$RPM_PATH .
          docker stop temp-container
          docker rm temp-container
