- name: Construir RPM con Docker
        run: |
          set -x
          docker build -t builder .
          docker create -ti --name temp-container builder
          
          # Intentamos construir y capturamos el error si falla
          if ! docker exec temp-container rpmbuild -ba /root/rpmbuild/SPECS/sinergia.spec; then
            echo "¡ERROR EN RPMBUILD!"
            # Vemos qué hay en los logs de error de rpmbuild
            docker exec temp-container cat /root/rpmbuild/BUILD/build.log || echo "No hay log de build"
            exit 1
          fi
          
          RPM_PATH=$(docker exec temp-container find /root/rpmbuild/RPMS -name "*.rpm" | head -n 1)
          docker cp temp-container:$RPM_PATH .
          docker rm temp-container
