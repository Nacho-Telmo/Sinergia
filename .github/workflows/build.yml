name: Build DEB Package

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create DEB structure
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/sinergia-dd-burner
          # Copiamos tu código
          cp app.py package/usr/share/sinergia-dd-burner/
          # Creamos el lanzador
          echo -e '#!/bin/bash\ncd /usr/share/sinergia-dd-burner/\npython3 app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          # Creamos el archivo de control
          echo "Package: sinergia-dd-burner
Version: 1.0.0
Section: utils
Priority: optional
Architecture: all
Depends: python3, python3-pyqt6
Maintainer: Nacho-Telmo <tuemail@ejemplo.com>
Description: Herramienta para quemar imágenes ISO en dispositivos DD." > package/DEBIAN/control

      - name: Build Package
        run: dpkg-deb --build --root-owner-group package sinergia-dd-burner_1.0.0.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: deb-package
          path: sinergia-dd-burner_1.0.0.deb
