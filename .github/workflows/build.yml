name: CI/CD Packaging & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir DEB
        run: |
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/sinergia-dd-burner
          cp app.py package/usr/share/sinergia-dd-burner/
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          echo -e "Package: sinergia-dd-burner\nVersion: 1.0.2\nArchitecture: all\nDepends: python3\nMaintainer: Nacho\nDescription: Sinergia DD Burner" > package/DEBIAN/control
          dpkg-deb --build package sinergia-dd-burner_1.0.2.deb

      - name: Construir RPM de forma Nativa
        run: |
          sudo apt-get update && sudo apt-get install -y rpm devscripts
          mkdir -p rpmbuild/{SOURCES,SPECS,RPMS,SRPMS,BUILD,BUILDROOT}
          cp app.py rpmbuild/SOURCES/
          cp sinergia.spec rpmbuild/SPECS/
          rpmbuild --define "_topdir ${{ github.workspace }}/rpmbuild" -ba rpmbuild/SPECS/sinergia.spec
          mv rpmbuild/RPMS/noarch/*.rpm . || echo "No se pudo mover el RPM binario"
          mv rpmbuild/SRPMS/*.rpm . || echo "No se pudo mover el SRPM fuente"

      - name: Subir a los Artefactos (Por las dudas)
        uses: actions/upload-artifact@v4
        with:
          name: paquetes-finales
          path: |
            *.deb
            *.rpm

      - name: Publicar automáticamente en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.2
          name: "Sinergia DD Burner v1.0.2"
          body: |
            ### Sinergia DD Burner - Versión 1.0.2
            ¡Nueva versión empaquetada oficialmente para la comunidad!
            
            **Paquetes incluidos:**
            * `.deb` para Debian, Ubuntu, Linux Mint y derivados.
            * `.rpm` para Fedora, Red Hat y derivados.
          files: |
            *.deb
            *.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
