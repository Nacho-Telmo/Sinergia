name: CI/CD Packaging

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir RPM con Docker
        run: |
          docker build -t builder .
          docker create -ti --name temp-container builder
          # LISTAR archivos para ver dónde quedaron
          echo "Contenido de /root/rpmbuild/RPMS/noarch/:"
          docker cp temp-container:/root/rpmbuild/RPMS/noarch/ .
          ls -R noarch/
          docker rm temp-container

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: paquetes-finales
          path: noarch/*.rpm
