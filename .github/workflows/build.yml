name: CI/CD Packaging

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir DEB
        run: |
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/sinergia-dd-burner
          cp app.py package/usr/share/sinergia-dd-burner/
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          echo -e "Package: sinergia-dd-burner\nVersion: 1.0.2\nArchitecture: all\nDepends: python3\nMaintainer: Nacho\nDescription: Sinergia DD Burner" > package/DEBIAN/control
          dpkg-deb --build package sinergia-dd-burner_1.0.2.deb

      - name: Construir RPM con Docker
        run: |
          # 1. Construir la imagen normalmente
          docker build -t builder .
          
          # 2. Crear una carpeta temporal en GitHub para recibir el paquete
          mkdir -p output
          
          # 3. Correr el contenedor mapeando la carpeta actual e indicándole que copie el RPM directo afuera
          docker run --rm -v ${{ github.workspace }}/output:/mnt/output builder /bin/bash -c "find /root/rpmbuild/RPMS -name '*.rpm' -exec cp {} /mnt/output/ \;"
          
          # 4. Mover el RPM extraído a la raíz del proyecto para que sea visible
          mv output/*.rpm . || echo "¡ALERTA! No se encontró ningún archivo .rpm en output"

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: paquetes-finales
          path: |
            *.deb
            *.rpm
