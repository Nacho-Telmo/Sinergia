name: Build DEB Package

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create DEB structure
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/sinergia-dd-burner
          cp app.py package/usr/share/sinergia-dd-burner/
          echo '#!/bin/bash' > package/usr/bin/sinergia-dd-burner
          echo 'cd /usr/share/sinergia-dd-burner/' >> package/usr/bin/sinergia-dd-burner
          echo 'python3 app.py "$@"' >> package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner
          echo "Package: sinergia-dd-burner" > package/DEBIAN/control
          echo "Version: 1.0.0" >> package/DEBIAN/control
          echo "Section: utils" >> package/DEBIAN/control
          echo "Priority: optional" >> package/DEBIAN/control
          echo "Architecture: all" >> package/DEBIAN/control
          echo "Depends: python3, python3-pyqt6" >> package/DEBIAN/control
          echo "Maintainer: Nacho-Telmo" >> package/DEBIAN/control
          echo "Description: Sinergia DD Burner" >> package/DEBIAN/control

      - name: Build Package
        run: dpkg-deb --build --root-owner-group package sinergia-dd-burner_1.0.0.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: deb-package
          path: sinergia-dd-burner_1.0.0.deb
