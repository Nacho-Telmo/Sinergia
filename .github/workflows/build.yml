name: Build DEB
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Package
        run: |
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/sinergia-dd-burner package/usr/share/applications

          # Copia el código fuente
          cp app.py package/usr/share/sinergia-dd-burner/
          # Copia el lanzador para el menú
          cp sinergia-dd-burner.desktop package/usr/share/applications/

          # Crea el ejecutable global
          echo -e '#!/bin/bash\npython3 /usr/share/sinergia-dd-burner/app.py "$@"' > package/usr/bin/sinergia-dd-burner
          chmod 755 package/usr/bin/sinergia-dd-burner

          # Crea el archivo de control
          echo -e "Package: sinergia-dd-burner\nVersion: 1.0.1\nArchitecture: all\nDepends: python3, python3-pyqt6\nMaintainer: Nacho\nDescription: Sinergia DD Burner" > package/DEBIAN/control

          # Empaqueta
          dpkg-deb --build package sinergia-dd-burner_1.0.1.deb

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: sinergia-dd-burner_1.0.1.deb
